permissions:
  contents: read

name: FR Coverage

on: [pull_request]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.1.1
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      - run: |
          if [ ! -f tooling/fr-coverage ]; then
            mkdir -p tooling
            if [ -d phenotype-tooling ]; then
              cd phenotype-tooling && cargo build --release --bin fr-coverage 2>&1 | tail -5
              ln -sf ../phenotype-tooling/target/release/fr-coverage ../tooling/
            else
              echo "Note: fr-coverage not available; skipping" && exit 0
            fi
          fi
          tooling/fr-coverage --pr || true
