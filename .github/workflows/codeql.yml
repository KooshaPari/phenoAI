name: CodeQL
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '27 4 * * 1'
permissions:
  contents: read
  security-events: write
  actions: read
jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: ["actions"]
    steps:
      - uses: actions/checkout11bd71901bbe5b1630ceea73d27597364c9af683 # v4.1.1
      - uses: github/codeql-action/init@c15bbf03b9a44c4c82ae160f148208819ad7f737 # v3
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/analyze@c15bbf03b9a44c4c82ae160f148208819ad7f737 # v3
        with:
          category: "/language:${{ matrix.language }}"
