name: Quality Gate
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


permissions:
  contents: read
on: [push, pull_request]

jobs:
  gate:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout11bd71901bbe5b1630ceea73d27597364c9af683 # v4.1.1
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      - run: |
          if [ ! -f tooling/quality-gate ]; then
            mkdir -p tooling
            if [ -d phenotype-tooling ]; then
              cd phenotype-tooling && cargo build --release --bin quality-gate 2>&1 | tail -5
              ln -sf ../phenotype-tooling/target/release/quality-gate ../tooling/
            else
              echo "Note: quality-gate not available; skipping" && exit 0
            fi
          fi
          tooling/quality-gate --quick || true
