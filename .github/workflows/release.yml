name: Release
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      crate:
        description: 'Specific crate to publish (empty = all publishable)'
        required: false

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          CRATE_INPUT: ${{ inputs.crate }}
        run: |
          if [ -n "$CRATE_INPUT" ]; then
            cargo publish -p "$CRATE_INPUT" --no-verify
          else
            failed=0
            total=0
            for name in $(cargo metadata --format-version=1 --no-deps | jq -r '.packages[] | select(.publish != []) | .name'); do
              echo "Publishing $name"
              total=$((total + 1))
              if ! cargo publish -p "$name" --no-verify; then
                if cargo search "$name" --limit 1 | grep -q "^$name ="; then
                  echo "  skip $name (already published)"
                else
                  echo "  FAILED to publish $name"
                  failed=$((failed + 1))
                fi
              fi
            done
            if [ "$total" -gt 0 ] && [ "$failed" -eq "$total" ]; then
              echo "ERROR: All $total publish attempts failed"
              exit 1
            fi
          fi
